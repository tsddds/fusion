name: Publicar Ruyuen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Crear sitio
        run: npm run build

      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4
